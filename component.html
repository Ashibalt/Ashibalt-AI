<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Input — Redesign</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0f0f10;
      --surface:      #1a1a1c;
      --surface-2:    #222224;
      --surface-3:    #2a2a2e;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --border-focus: rgba(255,255,255,0.18);
      --text:         #e8e8ea;
      --text-2:       #8a8a96;
      --text-3:       #52525c;
      --accent:       #5b7cf6;
      --accent-dim:   rgba(91,124,246,0.15);
      --accent-glow:  rgba(91,124,246,0.25);
      --green:        #34d399;
      --green-dim:    rgba(52,211,153,0.12);
      --radius-outer: 18px;
      --radius-inner: 13px;
      --radius-pill:  99px;
      --font:         'Geist', -apple-system, sans-serif;
      --ease:         cubic-bezier(.16,1,.3,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--font);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    /* subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(91,124,246,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── wrapper ─────────────────────────────────── */
    .chat-wrap {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* small label above */
    .chat-label {
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      padding-left: 4px;
      font-weight: 400;
    }

    /* ── main input card ─────────────────────────── */
    .chat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-outer);
      transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
      position: relative;
      overflow: visible;
    }

    .chat-card:focus-within {
      border-color: var(--border-focus);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 40px rgba(0,0,0,0.35),
        0 0 60px rgba(91,124,246,0.05);
    }

    /* ── textarea ───────────────────────────────── */
    .chat-textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.65;
      padding: 18px 20px 6px;
      min-height: 54px;
      max-height: 220px;
      overflow-y: auto;
      caret-color: var(--accent);
      display: block;
    }

    .chat-textarea::placeholder {
      color: var(--text-3);
      font-weight: 300;
    }

    .chat-textarea::-webkit-scrollbar { width: 3px; }
    .chat-textarea::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

    /* ── bottom bar ─────────────────────────────── */
    .chat-bar {
      display: flex;
      align-items: center;
      padding: 10px 12px 12px 14px;
      gap: 6px;
    }

    /* ── selectors group ────────────────────────── */
    .selectors {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      flex-wrap: wrap;
    }

    /* base selector button */
    .sel-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 5px 10px 5px 8px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      transition: border-color 0.18s, background 0.18s, color 0.18s;
      white-space: nowrap;
      user-select: none;
    }

    .sel-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface-3);
    }

    .sel-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* active state */
    .sel-btn.active {
      border-color: rgba(91,124,246,0.4);
      background: var(--accent-dim);
      color: #a5b8fb;
    }

    .sel-btn.active .sel-dot {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    /* model active */
    .sel-btn.model-active {
      border-color: rgba(52,211,153,0.3);
      background: var(--green-dim);
      color: #6ee7b7;
    }

    .sel-btn.model-active .sel-dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .sel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .sel-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .sel-chevron {
      width: 10px;
      height: 10px;
      opacity: 0.4;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.2s var(--ease);
    }

    .sel-btn:hover .sel-chevron { opacity: 0.7; }
    .sel-btn[aria-expanded="true"] .sel-chevron { transform: rotate(180deg); }

    /* divider between selectors */
    .sel-divider {
      width: 1px;
      height: 14px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* ── right side tools ───────────────────────── */
    .tools {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .tool-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .tool-btn:hover { color: var(--text-2); background: var(--surface-3); }
    .tool-btn:focus-visible { outline: 2px solid var(--accent); }

    /* ── send button ────────────────────────────── */
    .send-btn {
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-3);
      flex-shrink: 0;
      transition: background 0.2s var(--ease), border-color 0.2s, color 0.2s, transform 0.15s;
      margin-left: 4px;
    }

    .send-btn.ready {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .send-btn.ready:hover {
      background: #6b8cf8;
      transform: scale(1.04);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .send-btn:active { transform: scale(0.95); }
    .send-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }


    /* ══════════════════════════════════════════════
       DROPDOWN
    ══════════════════════════════════════════════ */
    .dropdown-anchor {
      position: relative;
      display: inline-flex;
    }

    .dropdown-menu {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: #1e1e22;
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      min-width: 180px;
      padding: 5px;
      z-index: 100;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.18s var(--ease), transform 0.18s var(--ease);
    }

    .dropdown-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .dropdown-header {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 4px 10px 6px;
      font-weight: 500;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-2);
      transition: background 0.12s, color 0.12s;
      border: none;
      background: none;
      width: 100%;
      font-family: var(--font);
      text-align: left;
      position: relative;
    }

    .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .dropdown-item:focus-visible { outline: 2px solid var(--accent); border-radius: 8px; }

    .dropdown-item.selected {
      color: var(--text);
    }

    .dropdown-item.selected::after {
      content: '';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .dropdown-item-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
    }

    .dropdown-item-info { flex: 1; overflow: hidden; }
    .dropdown-item-name { font-size: 12.5px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dropdown-item-desc { font-size: 10.5px; color: var(--text-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .dropdown-separator { height: 1px; background: var(--border); margin: 4px 0; }

    /* ── char counter ───────────────────────────── */
    .char-count {
      font-size: 10px;
      color: var(--text-3);
      transition: color 0.2s;
      font-variant-numeric: tabular-nums;
      padding: 0 2px;
    }

    .char-count.warn { color: #f59e0b; }
    .char-count.over { color: #ef4444; }


    /* ── demo context (for display only) ───────── */
    .demo-context {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 4px;
      flex-wrap: wrap;
    }

    .demo-hint {
      font-size: 11px;
      color: var(--text-3);
    }

    /* ── responsive ─────────────────────────────── */
    @media (max-width: 480px) {
      .chat-textarea { font-size: 15px; }
      .sel-divider { display: none; }
    }
  </style>
</head>
<body>

<div class="chat-wrap">
  <div class="demo-context">
    <span class="demo-hint">↑ redesigned input component</span>
  </div>

  <div class="chat-card" role="group" aria-label="Чат ввод">

    <textarea
      class="chat-textarea"
      id="main-ta"
      placeholder="Задай вопрос или нажми / для команд…"
      rows="1"
      maxlength="8000"
      aria-label="Поле сообщения"
      aria-multiline="true"
    ></textarea>

    <div class="chat-bar">

      <!-- selectors -->
      <div class="selectors" role="toolbar" aria-label="Настройки запроса">

        <!-- Agent selector -->
        <div class="dropdown-anchor" id="agent-anchor">
          <button
            class="sel-btn active"
            id="agent-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-label="Выбрать агента: Agent"
          >
            <span class="sel-dot"></span>
            <!-- robot icon -->
            <svg class="sel-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <rect x="4" y="6" width="8" height="7" rx="1.5"/>
              <path d="M5.5 9.5h1M9.5 9.5h1"/>
              <path d="M8 6V4"/>
              <circle cx="8" cy="3.5" r="1"/>
              <path d="M2 9h2M12 9h2"/>
            </svg>
            <span id="agent-label">Agent</span>
            <svg class="sel-chevron" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M2 3.5l3 3 3-3"/>
            </svg>
          </button>

          <div class="dropdown-menu" id="agent-menu" role="listbox" aria-label="Режим агента">
            <div class="dropdown-header">Режим</div>
            <button class="dropdown-item selected" role="option" aria-selected="true" data-val="Agent">
              <span class="dropdown-item-icon">⚡</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">Agent</span>
              </span>
            </button>
            <button class="dropdown-item" role="option" aria-selected="false" data-val="Ask">
              <span class="dropdown-item-icon">💬</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">Ask</span>
              </span>
            </button>
            <button class="dropdown-item" role="option" aria-selected="false" data-val="Edit">
              <span class="dropdown-item-icon">✏️</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">Deep Planning</span>
              </span>
            </button>
          </div>
        </div>

        <div class="sel-divider" aria-hidden="true"></div>

        <!-- Model selector -->
        <div class="dropdown-anchor" id="model-anchor">
          <button
            class="sel-btn model-active"
            id="model-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-label="Выбрать модель: minimax-m2.5"
          >
            <span class="sel-dot"></span>
            <!-- sparkle icon -->
            <svg class="sel-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M8 2v2M8 12v2M2 8h2M12 8h2"/>
              <path d="M4.22 4.22l1.42 1.42M10.36 10.36l1.42 1.42M4.22 11.78l1.42-1.42M10.36 5.64l1.42-1.42"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
            <span id="model-label">minimax-m2.5</span>
            <svg class="sel-chevron" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M2 3.5l3 3 3-3"/>
            </svg>
          </button>

          <div class="dropdown-menu" id="model-menu" role="listbox" aria-label="Выбор модели">
            <div class="dropdown-header">Модель</div>
            <button class="dropdown-item selected" role="option" aria-selected="true" data-val="minimax-m2.5">
              <span class="dropdown-item-icon">🧠</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">minimax-m2.5</span>
                <span class="dropdown-item-desc">Быстрая · По умолчанию</span>
              </span>
            </button>
            <button class="dropdown-item" role="option" aria-selected="false" data-val="minimax-pro">
              <span class="dropdown-item-icon">🚀</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">minimax-pro</span>
                <span class="dropdown-item-desc">Мощная · Для сложных задач</span>
              </span>
            </button>
            <div class="dropdown-separator"></div>
            <button class="dropdown-item" role="option" aria-selected="false" data-val="claude-3.5">
              <span class="dropdown-item-icon">✦</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">Claude 3.5</span>
                <span class="dropdown-item-desc">Anthropic · Высокое качество</span>
              </span>
            </button>
            <button class="dropdown-item" role="option" aria-selected="false" data-val="gpt-4o">
              <span class="dropdown-item-icon">◎</span>
              <span class="dropdown-item-info">
                <span class="dropdown-item-name">GPT-4o</span>
                <span class="dropdown-item-desc">OpenAI · Мультимодальная</span>
              </span>
            </button>
          </div>
        </div>

      </div>

      <!-- right: tools + char count + send -->
      <div class="tools">

        <span class="char-count" id="char-count" aria-live="polite" aria-label="Символов введено"></span>

        <button class="tool-btn" aria-label="Прикрепить файл" title="Прикрепить">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>

        <button
          class="send-btn"
          id="send-btn"
          aria-label="Отправить сообщение"
          disabled
        >
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>

      </div>
    </div>
  </div>
</div>

<script>
  /* ── textarea auto-resize + send state ─────── */
  const ta      = document.getElementById('main-ta');
  const sendBtn = document.getElementById('send-btn');
  const charEl  = document.getElementById('char-count');
  const MAX     = 8000;

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';

    const len = ta.value.length;
    const hasText = ta.value.trim().length > 0;

    sendBtn.disabled = !hasText;
    sendBtn.classList.toggle('ready', hasText);

    if (len > MAX * 0.8) {
      charEl.textContent = len + ' / ' + MAX.toLocaleString();
      charEl.className = 'char-count' + (len >= MAX ? ' over' : ' warn');
    } else {
      charEl.textContent = '';
      charEl.className = 'char-count';
    }
  });

  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (ta.value.trim()) submit();
    }
  });

  sendBtn.addEventListener('click', submit);

  function submit() {
    ta.value = '';
    ta.style.height = 'auto';
    sendBtn.disabled = true;
    sendBtn.classList.remove('ready');
    charEl.textContent = '';
    ta.focus();
  }

  /* ── dropdown logic ─────────────────────────── */
  function setupDropdown(btnId, menuId, labelId, onSelect) {
    const btn   = document.getElementById(btnId);
    const menu  = document.getElementById(menuId);
    const label = document.getElementById(labelId);

    btn.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = menu.classList.contains('open');
      closeAll();
      if (!isOpen) {
        menu.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
      }
    });

    menu.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', () => {
        menu.querySelectorAll('.dropdown-item').forEach(i => {
          i.classList.remove('selected');
          i.setAttribute('aria-selected', 'false');
        });
        item.classList.add('selected');
        item.setAttribute('aria-selected', 'true');
        label.textContent = item.dataset.val;
        btn.setAttribute('aria-label', btn.getAttribute('aria-label').split(':')[0] + ': ' + item.dataset.val);
        if (onSelect) onSelect(item.dataset.val);
        closeAll();
      });
    });
  }

  function closeAll() {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    document.querySelectorAll('[aria-expanded]').forEach(b => b.setAttribute('aria-expanded', 'false'));
  }

  document.addEventListener('click', closeAll);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(); });

  setupDropdown('agent-btn', 'agent-menu', 'agent-label');
  setupDropdown('model-btn', 'model-menu', 'model-label');
</script>
</body>
</html>
